<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glark Exchange</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="authContainer" class="auth-box">
    <h2>Glark Exchange Login</h2>
    <div class="auth-row">
      <label>Username <input id="authUsername" type="text" /></label>
    </div>
    <div class="auth-row">
      <label>Password <input id="authPassword" type="password" /></label>
    </div>
    <div class="auth-row">
      <button id="authLoginBtn">Login</button>
      <button id="authRegisterBtn">Register</button>
    </div>
    <p id="authMessage" class="auth-message"></p>
  </div>
  <div id="gameContainer" class="hidden">
    <div class="container">
      <header>
        <h1>Glark Exchange</h1>
      </header>

    <main>
      <aside class="status">
        <div class="stat-block">
          <span>Glark</span>
          <strong id="glarkValue">0</strong>
        </div>
        <div class="stat-block">
          <span>Multiplier</span>
          <strong id="multiplierValue">x1</strong>
        </div>
        <div class="stat-block">
          <span>Plark</span>
          <strong id="plarkValue">0</strong>
          <button id="shopBtn" class="small-button">Shop</button>
        </div>
        <div class="stat-block">
          <span>Next Tick</span>
          <strong id="tickValue">--:--</strong>
        </div>
      </aside>

      <section class="activity">
        <div class="tx-items-row">
          <div class="box transactions">
            <div class="box-header">
              <h2>Transactions</h2>
              <input id="txFilter" type="text" placeholder="Search transactions" />
            </div>
            <div id="transactionsList" class="log"></div>
          </div>

          <div id="itemsBox" class="box items-box">
            <div class="box-header">
              <h2>Items</h2>
            </div>
            <div class="items-list"></div>
          </div>
        </div>

        <div class="box chatgroup">
          <div class="box-header">
            <h2>Chats</h2>
          </div>
          <div class="chat-tabs">
            <button class="chat-tab active" data-chat="1">Chat 1</button>
            <button class="chat-tab" data-chat="2">Chat 2</button>
            <button class="chat-tab" data-chat="3">Chat 3</button>
          </div>
          <div class="box-header chat-search-row">
            <input id="chatFilter" type="text" placeholder="Search chats" />
          </div>
          <div id="chatLog" class="log"></div>
          <div class="chat-input-row">
            <input id="chatMessage" type="text" placeholder="Type a message" />
            <button id="sendChatBtn">Send</button>
          </div>
        </div>
      </section>
    </main>
    </div>
  </div>

  <div id="shopModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title-row">
        <h3>Shop</h3>
        <button id="shopCloseBtn" class="modal-close-btn">&#x2715;</button>
      </div>
      <p>Shop content coming soon.</p>
    </div>
  </div>

  <div id="transferModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title-row">
        <h3>Send Glark to</h3>
        <button id="sendItemBtn" class="send-item-btn hidden">Send Item</button>
      </div>
      <p id="transferTarget"></p>
      <input id="transferAmount" type="number" min="1" placeholder="Amount" />
      <p class="transfer-hint">You must keep at least 10 Glark after transferring.</p>
      <div class="modal-actions">
        <button id="confirmTransfer">Send</button>
        <button id="cancelTransfer">Cancel</button>
      </div>
    </div>
  </div>

  <div id="transferConfirmModal" class="modal hidden">
    <div class="modal-content">
      <p id="transferConfirmMessage"></p>
      <div class="modal-actions">
        <button id="transferConfirmYes">Yes</button>
        <button id="transferConfirmNo">No</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <div id="selectionModeBar" class="selection-mode-bar hidden">
    <span>Select an item to send to <strong id="selectionTargetName"></strong></span>
    <button id="cancelSelectionBtn">Cancel</button>
  </div>

  <div id="trophyOverlay" class="trophy-overlay hidden">
    <div class="trophy-content">
      <p id="trophyMessage"></p>
      <button onclick="document.getElementById('trophyOverlay').classList.add('hidden')">Dismiss</button>
    </div>
  </div>

  <div id="itemTooltip" class="item-tooltip"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
